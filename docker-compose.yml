services:
  bluecore-ai:
    build: .
    ports:
      - "8095:8095"
    env_file:
      - .env
    environment:
      SERVICE_HOST: 0.0.0.0
      SERVICE_PORT: 8095
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production-min32}
      SERVICE_AUTH_TOKEN: ${SERVICE_AUTH_TOKEN:-dev-service-token-not-for-prod-use!!}
      LLM_PROVIDER: ${LLM_PROVIDER:-stub}
      PROMPTS_DIR: /app/prompts
    volumes:
      - ./service/app:/app/app
      - ./prompts:/app/prompts
    restart: unless-stopped
